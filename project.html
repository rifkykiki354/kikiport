<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Website</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
}

/* HEADER */
.header {
  padding: 40px 20px 10px;
}

.header h1 {
  font-weight: 300;
  color: #aaa;
  margin: 0;
}

.header h2 {
  color: #ff6b6b;
  margin-top: 5px;
  font-weight: normal;
}

/* MENU */
.menu {
  margin: 20px 0;
}

.menu a {
  margin: 0 10px;
  text-decoration: none;
  color: #999;
  font-size: 14px;
}

.menu a:hover {
  color: #ff6b6b;
}

/* GALLERY */
.gallery {
  width: 90%;
  max-width: 1100px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.gallery img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .gallery {
    grid-template-columns: repeat(1, 1fr);
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Rifky Zanuar</h1>
  <h2>Website Design</h2>
</div>

<div class="menu">
  <a href="#">about me</a>
  <a href="#">contact</a>
  <a href="index.html">back</a>
</div>

<div class="gallery">
  <img src="https://picsum.photos/400/300?1">
  <img src="https://picsum.photos/400/500?2">
  <img src="https://picsum.photos/400/600?3">
  <img src="https://picsum.photos/400/300?4">
  <img src="https://picsum.photos/400/400?5">
  <img src="https://picsum.photos/400/500?6">
</div>

</body>
</html>
